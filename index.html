<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>To-Do List</h1>

    <!-- Dark Mode -->
    <label class="toggle">
      <input type="checkbox" id="darkToggle">
      <span>Dark Mode</span>
    </label>

    <!-- Input -->
    <div class="form">
      <input type="text" id="taskInput" placeholder="Take Medicine">
      <input type="date" id="dateInput">
      <input type="time" id="timeInput">
      <input type="text" id="categoryInput" placeholder="Category (optional)">
      <button onclick="addTask()">Add Task</button>
    </div>

    <!-- Filter -->
    <div class="filters">
      <button onclick="filterTasks('all')">All Tasks</button>
      <button onclick="filterTasks('pending')">Pending Tasks</button>
      <button onclick="filterTasks('done')">Completed Tasks</button>
    </div>

    <!-- List -->
    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
