<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">

    <!-- Card Profile -->
    <div class="profile-card">
      <img src="WhatsApp Image 2026-01-28 at 20.26.01 (3).jpeg" alt="foto">
      <div class="profile-info">
        <h3 id="nama">Nama: -</h3>
        <p id="kelas">Kelas: -</p>
        <p id="umur">Umur: -</p>
      </div>
    </div>

    <!-- Input Profil -->
    <div class="profile-input">
      <input type="text" id="inputNama" placeholder="Masukkan nama">
      <input type="text" id="inputKelas" placeholder="Masukkan kelas">
      <input type="number" id="inputUmur" placeholder="Masukkan umur">
      <button onclick="saveProfile()">Simpan Profil</button>
    </div>

    <!-- Header -->
    <div class="header">
      <h2>To Do List</h2>
      <span id="datetime"></span>
    </div>

    <!-- Input Task -->
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Tambah tugas...">
      <button onclick="addTask()">+</button>
    </div>

    <!-- List -->
    <ul id="taskList"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
